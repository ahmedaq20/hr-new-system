version: '3.8'

name: Ministry_HRMS

x-buildkit: &buildkit
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ministry_hrms}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hrms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    image: hrms-backend
    container_name: hrms_backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/var/www/html
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrms_network

  frontend-builder:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api/v1}
    image: hrms-frontend
    container_name: hrms_frontend_builder
    volumes:
      - ../frontend:/app
      - frontend_dist:/output
    networks:
      - hrms_network

  nginx:
    image: nginx:alpine
    container_name: hrms_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend-builder
    networks:
      - hrms_network

volumes:
  postgres_data:
    driver: local
  backend_storage:
    driver: local
  backend_cache:
    driver: local
  frontend_dist:
    driver: local

networks:
  hrms_network:
    driver: bridge
